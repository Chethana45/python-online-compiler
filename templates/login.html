<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#7b2cbf,#ff4d9d);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.form-box{
background:white;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#7b2cbf;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
}

button:hover{
background:#5a189a;
}

.error{
color:red;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="form-box">

<h2>Python IDE Login</h2>

{% if error %}
<p class="error">{{error}}</p>
{% endif %}

<form action="/login" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<br>

<a href="/register">Create new account</a>

</div>

</body>
</html>
