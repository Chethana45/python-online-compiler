<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login • Python Compiler IDE</title>

<link rel="stylesheet" href="/static/style.css">

<style>

/* Background */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* Login box */

.login-box{
background:rgba(255,255,255,0.1);
backdrop-filter: blur(15px);
padding:40px;
width:320px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
color:white;
}

/* Logo */

.logo{
font-size:30px;
font-weight:bold;
margin-bottom:10px;
letter-spacing:1px;
}

/* Subtitle */

.subtitle{
opacity:0.9;
font-size:14px;
margin-bottom:25px;
}

/* Inputs */

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
font-size:14px;
}

/* Input focus */

input:focus{
box-shadow:0 0 5px #fff;
}

/* Button */

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#00c6ff;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

/* Button hover */

button:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* Register link */

a{
display:block;
margin-top:18px;
color:white;
text-decoration:none;
font-size:13px;
opacity:0.9;
}

a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">⚡ Python IDE</div>

<div class="subtitle">
Online Python Compiler Platform
</div>

<form action="/login" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<a href="/register">Create new account</a>

</div>

</body>

</html>
