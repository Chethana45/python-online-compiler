
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login • Python Compiler IDE</title>

<link rel="stylesheet" href="/static/style.css">

<style>

/* Extra login animations */

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
letter-spacing:1px;
}

.subtitle{
opacity:0.8;
font-size:14px;
margin-bottom:20px;
}

</style>

</head>

<body class="login-body">

<div class="login-box">

<div class="logo">⚡ Python IDE</div>

<div class="subtitle">
Online Python Compiler Platform
</div>

<form action="/login" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<a href="/register">Create new account</a>

</div>

</body>

</html>
