
<!DOCTYPE html>
<html>

<head>

<title>Create Account</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#7b2cbf,#ff4d9d);
}

/* GLASS CARD */

.form-box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:45px;
border-radius:16px;
width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
color:white;
}

/* TITLE */

.form-box h2{
margin-bottom:25px;
}

/* INPUT FIELDS */

input{
width:100%;
padding:12px;
margin:12px 0;
border-radius:8px;
border:none;
outline:none;
font-size:14px;
}

/* INPUT FOCUS EFFECT */

input:focus{
box-shadow:0 0 8px #ffffff;
}

/* REGISTER BUTTON */

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#ff4d9d,#7b2cbf);
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

/* HOVER EFFECT */

button:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* LOGIN LINK */

a{
display:block;
margin-top:15px;
color:white;
text-decoration:none;
font-size:14px;
}

a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="form-box">

<h2>Create Account</h2>

<form action="/register" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<a href="/">Already have an account? Login</a>

</div>

</body>

</html>
