
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Python IDE</title>

<link rel="stylesheet" href="/static/style.css">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#7b2cbf,#ff4d9d);
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#7b2cbf;
color:white;
font-size:22px;
}

/* MAIN LAYOUT */

.container{
display:flex;
height:90vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#2f2f3a;
color:white;
padding:20px;
}

.sidebar button{
margin-top:15px;
padding:10px 15px;
background:#2ecc71;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

/* MAIN AREA */

.main{
flex:1;
padding:30px;
display:flex;
flex-direction:column;
gap:20px;
}

/* CODE EDITOR */

#editor{
width:100%;
height:300px;
background:#1e1e1e;
color:white;
border-radius:10px;
padding:15px;
font-family:monospace;
font-size:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* BUTTON ROW */

.buttons{
display:flex;
gap:12px;
}

.buttons button{
padding:10px 20px;
background:#2ecc71;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

/* OUTPUT BOX */

#output{
background:black;
color:#0f0;
padding:20px;
border-radius:12px;
min-height:120px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

</style>

</head>

<body>

<div class="topbar">

<div>Python IDE</div>

<a href="/" style="color:#00e1ff">Logout</a>

</div>



<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<h3>Files</h3>

<button onclick="newFile()">New File</button>

<ul id="fileList"></ul>

</div>



<!-- MAIN IDE -->

<div class="main">

<textarea id="editor">
print("Hello Python")
</textarea>



<div class="buttons">

<button onclick="runCode()">Run</button>

<button onclick="saveFile()">Save</button>

<button onclick="toggleTheme()">Theme</button>

</div>



<h3>Output</h3>

<pre id="output"></pre>



</div>

</div>

<script src="/static/script.js"></script>

</body>

</html>
